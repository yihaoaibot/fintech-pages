name: Daily update

on:
  schedule:
    # 00:10 UTC = 08:10 Beijing
    - cron: '10 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update data
        run: node scripts/update_fintech_data.mjs

      - name: Commit and push
        run: |
          git config user.name "yihaoaibot"
          git config user.email "yihaoaibot@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git add docs/data.json
          git commit -m "Daily update: data.json"
          git push
